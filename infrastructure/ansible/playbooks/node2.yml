---
# Provision and deploy Node 2 (interface) only
# Usage: ansible-playbook playbooks/node2.yml

- name: Provision Node 2
  hosts: interface
  roles:
    - common
    - nvidia
    - docker
    - nfs
    - monitoring
    - role: vllm
      vars:
        vllm_container_name: vllm-node2
        vllm_dir: vllm-node2
    - comfyui
    - dashboard
    - open-webui
