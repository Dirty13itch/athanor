---
# Common setup for all Ubuntu nodes

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ hostname }}"

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - htop
      - jq
      - nfs-common
      - linux-headers-generic-hwe-24.04
      - linux-image-generic-hwe-24.04
    state: present

- name: Ensure athanor user exists
  ansible.builtin.user:
    name: athanor
    shell: /bin/bash
    groups: docker
    append: true
    state: present

- name: Configure passwordless sudo for athanor
  ansible.builtin.copy:
    content: "athanor ALL=(ALL) NOPASSWD:ALL\n"
    dest: /etc/sudoers.d/athanor
    mode: "0440"
    validate: "visudo -cf %s"

- name: Add SSH authorized keys
  ansible.posix.authorized_key:
    user: athanor
    key: "{{ item }}"
    state: present
  loop:
    - "{{ lookup('file', '~/.ssh/athanor_mgmt.pub') }}"

- name: Create /opt/athanor directory
  ansible.builtin.file:
    path: /opt/athanor
    state: directory
    owner: root
    group: root
    mode: "0755"
