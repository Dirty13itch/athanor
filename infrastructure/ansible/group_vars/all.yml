# Athanor cluster-wide variables

vault_ip: 192.168.1.203
node1_ip: 192.168.1.244
node2_ip: 192.168.1.225

# NFS
nfs_server: "{{ vault_ip }}"
nfs_mounts:
  - src: /mnt/user/models
    dest: /mnt/vault/models
  - src: /mnt/user/data
    dest: /mnt/vault/data
  - src: /mnt/user/appdata
    dest: /mnt/vault/appdata
nfs_options: "rw,soft,intr,rsize=131072,wsize=131072"

# Docker
docker_version: "5:29.2.1-1~ubuntu.24.04~noble"
compose_version: "v5.0.2"

# NVIDIA
nvidia_driver_version: "580"
nvidia_ctk_version: "1.18.2-1"

# Monitoring
prometheus_url: "http://{{ vault_ip }}:9090"
grafana_url: "http://{{ vault_ip }}:3000"

# Service ports
vllm_port: 8000
agents_port: 9000
comfyui_port: 8188
dashboard_port: 3001
open_webui_port: 3000
node_exporter_port: 9100
dcgm_exporter_port: 9400

# Media API keys (should be in ansible-vault in production)
sonarr_api_key: "00c61e0aab6b4e469f90ca3afd0dc07b"
radarr_api_key: "c6269fccc2b644498ec1c9ffcbc40124"
tautulli_api_key: "c5f35f970e614f6d90301dcad8cdf092"
