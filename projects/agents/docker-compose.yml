      - ATHANOR_MINIFLUX_URL=${ATHANOR_MINIFLUX_URL:-http://192.168.1.203:8070}
      - ATHANOR_MINIFLUX_USER=${ATHANOR_MINIFLUX_USER:-admin}
      - ATHANOR_MINIFLUX_PASS=${ATHANOR_MINIFLUX_PASS:-}
      - ATHANOR_NTFY_URL=${ATHANOR_NTFY_URL:-http://192.168.1.203:8880}
      - ATHANOR_NTFY_TOPIC=${ATHANOR_NTFY_TOPIC:-athanor}
      - ATHANOR_AGENT_API_TOKEN=${ATHANOR_AGENT_API_TOKEN:-}
      - ATHANOR_PORT=9000
      - ATHANOR_SONARR_API_KEY=${ATHANOR_SONARR_API_KEY}
