services:
  agents:
    build:
      context: .
      dockerfile: Dockerfile
    image: athanor/agents:latest
    container_name: athanor-agents
    restart: unless-stopped
    network_mode: host
    volumes:
      # Read-only access to deployed Athanor codebase
      - /opt/athanor:/workspace:ro
      # Writable implementation-authority mount for bounded safe-surface changes
      - /opt/athanor:/implementation
      # Governed proof commands publish truth artifacts under reports/.
      - /opt/athanor/reports:/workspace/reports
      # Writable staging area for task outputs
      - /opt/athanor/agent-output:/output
      # Data curator: personal data synced from DEV (read-only)
      - /opt/athanor/personal-data:/data/personal:ro
      # AUTO-002: Persistent audit log (90-day retention per CONSTITUTION.yaml)
      - /var/log/athanor:/var/log/athanor
    environment:
      - ATHANOR_ENV=dev
      - ATHANOR_NODE1_HOST=${ATHANOR_NODE1_HOST:-192.168.1.244}
      - ATHANOR_NODE2_HOST=${ATHANOR_NODE2_HOST:-192.168.1.225}
      - ATHANOR_VAULT_HOST=${ATHANOR_VAULT_HOST:-192.168.1.203}
      - ATHANOR_DEV_HOST=${ATHANOR_DEV_HOST:-192.168.1.189}
      - ATHANOR_LITELLM_URL=${ATHANOR_LITELLM_URL:-http://192.168.1.203:4000}
      - ATHANOR_LITELLM_API_KEY=${ATHANOR_LITELLM_API_KEY:-}
      - ATHANOR_LLM_MODEL=reasoning
      - ATHANOR_TASK_EXECUTION_MODEL=${ATHANOR_TASK_EXECUTION_MODEL:-reasoning}
      - ATHANOR_LLM_MODEL_FAST=coder
      - ATHANOR_VLLM_COORDINATOR_URL=${ATHANOR_VLLM_COORDINATOR_URL:-http://192.168.1.244:8000}
      - ATHANOR_VLLM_CODER_URL=${ATHANOR_VLLM_CODER_URL:-http://192.168.1.244:8100}
      - ATHANOR_VLLM_WORKER_URL=${ATHANOR_VLLM_WORKER_URL:-http://192.168.1.225:8010}
      - ATHANOR_VLLM_EMBEDDING_URL=${ATHANOR_VLLM_EMBEDDING_URL:-http://192.168.1.189:8001}
      - ATHANOR_VLLM_RERANKER_URL=${ATHANOR_VLLM_RERANKER_URL:-http://192.168.1.189:8003}
      - ATHANOR_AGENT_SERVER_URL=${ATHANOR_AGENT_SERVER_URL:-http://192.168.1.244:9000}
      - ATHANOR_DASHBOARD_URL=${ATHANOR_DASHBOARD_URL:-http://dev.athanor.local:3001}
      - ATHANOR_IMPLEMENTATION_AUTHORITY=${ATHANOR_IMPLEMENTATION_AUTHORITY:-/implementation}
      - ATHANOR_DEVSTACK_ROOT=${ATHANOR_DEVSTACK_ROOT:-/workspace/_external/devstack}
      - ATHANOR_QDRANT_URL=${ATHANOR_QDRANT_URL:-http://192.168.1.203:6333}
      - ATHANOR_REDIS_URL=${ATHANOR_REDIS_URL:-redis://192.168.1.203:6379/0}
      - ATHANOR_REDIS_PASSWORD=${ATHANOR_REDIS_PASSWORD:-}
      - ATHANOR_POSTGRES_URL=${ATHANOR_POSTGRES_URL:-}
      - ATHANOR_SUBSCRIPTION_POLICY_PATH=${ATHANOR_SUBSCRIPTION_POLICY_PATH:-/app/config/subscription-routing-policy.yaml}
      - ATHANOR_TRUTH_INVENTORY_DIR=${ATHANOR_TRUTH_INVENTORY_DIR:-/workspace/reports/truth-inventory}
      - ATHANOR_AGENT_DESCRIPTOR_PATH=${ATHANOR_AGENT_DESCRIPTOR_PATH:-/workspace/config/automation-backbone/agent-descriptor-registry.json}
      - ATHANOR_DOMAIN_PACKET_PATH=${ATHANOR_DOMAIN_PACKET_PATH:-/workspace/config/automation-backbone/domain-packets-registry.json}
      - ATHANOR_NEO4J_URL=${ATHANOR_NEO4J_URL:-http://192.168.1.203:7474}
