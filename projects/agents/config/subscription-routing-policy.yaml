version: 1
updated: 2026-04-17

providers:
  athanor_local:
    enabled: true
    category: local
    routing_posture: ordinary_auto
    routing_reason: verified_local_runtime
    role: owned_compute_first_reserve
    strengths:
      - privacy_sensitive
      - low_latency
      - background_automation
      - repetitive_transforms
      - sovereign_private_coding
      - bulk_harvest
    privacy: lan_only
    reserve: protect_then_harvest

  anthropic_claude_code:
    enabled: true
    category: subscription
    routing_posture: ordinary_auto
    routing_reason: verified_cli_or_recent_burn
    role: premium_interactive_architect
    strengths:
      - architecture
      - multi_file_editing
      - repo_surgery
      - final_review
    privacy: cloud
    reserve: premium_interactive

  openai_codex:
    enabled: true
    category: subscription
    routing_posture: ordinary_auto
    routing_reason: verified_cli_or_recent_burn
    role: default_implementation_and_async_executor
    strengths:
      - multi_file_implementation
      - backlog_execution
      - parallel_tasks
      - pr_sized_work
      - secondary_validation
    privacy: cloud
    reserve: premium_async

  google_gemini:
    enabled: true
    category: subscription
    routing_posture: ordinary_auto
    routing_reason: verified_cli_or_recent_burn
    role: large_context_auditor
    strengths:
      - repo_wide_analysis
      - broad_review
      - quota_harvest
    privacy: cloud
    reserve: burn_early

  moonshot_kimi:
    enabled: true
    category: subscription
    routing_posture: ordinary_auto
    routing_reason: verified_cli_recent_burn_cost_pending
    role: planning_alternative
    strengths:
      - architecture_alternatives
      - search_heavy_reasoning
      - second_pass_design
    privacy: cloud
    reserve: targeted

  zai_glm_coding:
    enabled: true
    category: subscription
    routing_posture: ordinary_auto
    routing_reason: verified_supported_tool_usage
    role: bulk_overflow_coder
    strengths:
      - bulk_implementation
      - repeated_fix_loops
      - scaffold_generation
      - overflow_capacity
    privacy: cloud
    reserve: subscription_bulk_overflow

task_classes:
  interactive_architecture:
    primary:
      - anthropic_claude_code
    fallback:
      - moonshot_kimi
      - google_gemini
      - openai_codex
      - athanor_local

  multi_file_implementation:
    primary:
      - openai_codex
    fallback:
      - athanor_local
      - anthropic_claude_code
      - zai_glm_coding

  async_backlog_execution:
    primary:
      - openai_codex
    fallback:
      - athanor_local
      - zai_glm_coding
      - google_gemini

  repo_wide_audit:
    primary:
      - google_gemini
    fallback:
      - athanor_local
      - anthropic_claude_code

  cheap_bulk_transform:
    primary:
      - athanor_local
    fallback:
      - zai_glm_coding
      - google_gemini
      - openai_codex

  overnight_harvest:
    primary:
      - athanor_local
    fallback:
      - zai_glm_coding
      - google_gemini
      - openai_codex

  search_heavy_planning:
    primary:
      - moonshot_kimi
    fallback:
      - anthropic_claude_code
      - google_gemini

  private_automation:
    primary:
      - athanor_local
    fallback: []

agents:
  coding-agent:
    default_task_class: multi_file_implementation
    sensitivity_default: repo_internal
    allowed_providers:
      - athanor_local
      - anthropic_claude_code
      - openai_codex
      - zai_glm_coding
      - google_gemini
      - moonshot_kimi

  research-agent:
    default_task_class: search_heavy_planning
    sensitivity_default: mixed
    allowed_providers:
      - athanor_local
      - anthropic_claude_code
      - google_gemini
      - moonshot_kimi
      - openai_codex

  general-assistant:
    default_task_class: private_automation
    sensitivity_default: private
    allowed_providers:
      - athanor_local

  knowledge-agent:
    default_task_class: private_automation
    sensitivity_default: private
    allowed_providers:
      - athanor_local

  home-agent:
    default_task_class: private_automation
    sensitivity_default: private
    allowed_providers:
      - athanor_local

  media-agent:
    default_task_class: private_automation
    sensitivity_default: private
    allowed_providers:
      - athanor_local

  stash-agent:
    default_task_class: private_automation
    sensitivity_default: private
    allowed_providers:
      - athanor_local

  data-curator:
    default_task_class: private_automation
    sensitivity_default: private
    allowed_providers:
      - athanor_local

quota_strategy:
  observe_reset_windows: true
  record_throttling_events: true
  preserve_premium_interactive_capacity: true
  use_local_owned_compute_first_when_quality_sufficient: true
  use_subscription_quota_before_metered_overflow: true
  metered_api_is_last_resort_for_bulk: true
  schedule_overnight_local_harvest: true

telemetry:
  log_provider_choice: true
  log_reason: true
  log_latency: true
  log_estimated_cost: true
  log_quota_errors: true
