services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: athanor/dashboard:latest
    container_name: athanor-dashboard
    restart: unless-stopped
    # The dashboard runs on DEV beside local retrieval runtimes, so host networking
    # keeps service probes honest for same-host ports like 8001/8003.
    network_mode: host
    group_add:
      - "988"  # docker group GID on WORKSHOP — grants socket access
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/athanor/reports:/opt/athanor/reports:ro
    environment:
      ATHANOR_TRUTH_INVENTORY_DIR: ${ATHANOR_TRUTH_INVENTORY_DIR:-/opt/athanor/reports/truth-inventory}
      NEXT_PUBLIC_PROMETHEUS_URL: ${NEXT_PUBLIC_PROMETHEUS_URL:-http://192.168.1.203:9090}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      ATHANOR_NODE1_HOST: ${ATHANOR_NODE1_HOST:-192.168.1.244}
      ATHANOR_NODE2_HOST: ${ATHANOR_NODE2_HOST:-192.168.1.225}
      ATHANOR_VAULT_HOST: ${ATHANOR_VAULT_HOST:-192.168.1.203}
      ATHANOR_DEV_HOST: ${ATHANOR_DEV_HOST:-192.168.1.189}
      ATHANOR_AGENT_SERVER_URL: ${ATHANOR_AGENT_SERVER_URL:-http://192.168.1.244:9000}
      ATHANOR_PROMETHEUS_URL: ${ATHANOR_PROMETHEUS_URL:-http://192.168.1.203:9090}
      ATHANOR_GRAFANA_URL: ${ATHANOR_GRAFANA_URL:-http://192.168.1.203:3000}
      ATHANOR_LITELLM_URL: ${ATHANOR_LITELLM_URL:-http://192.168.1.203:4000}
      ATHANOR_VLLM_COORDINATOR_URL: ${ATHANOR_VLLM_COORDINATOR_URL:-http://192.168.1.244:8000}
      ATHANOR_VLLM_CODER_URL: ${ATHANOR_VLLM_CODER_URL:-http://192.168.1.244:8100}
      ATHANOR_VLLM_WORKER_URL: ${ATHANOR_VLLM_WORKER_URL:-http://192.168.1.225:8010}
      ATHANOR_VLLM_EMBEDDING_URL: ${ATHANOR_VLLM_EMBEDDING_URL:-http://192.168.1.189:8001}
      ATHANOR_VLLM_RERANKER_URL: ${ATHANOR_VLLM_RERANKER_URL:-http://192.168.1.189:8003}
      ATHANOR_COMFYUI_URL: ${ATHANOR_COMFYUI_URL:-http://192.168.1.225:8188}
      ATHANOR_OPEN_WEBUI_URL: ${ATHANOR_OPEN_WEBUI_URL:-http://192.168.1.225:3000}
      ATHANOR_VAULT_OPEN_WEBUI_URL: ${ATHANOR_VAULT_OPEN_WEBUI_URL:-http://192.168.1.203:3090}
      ATHANOR_EOQ_URL: ${ATHANOR_EOQ_URL:-http://192.168.1.225:3002}
      ATHANOR_SONARR_URL: ${ATHANOR_SONARR_URL:-http://192.168.1.203:8989}
      ATHANOR_RADARR_URL: ${ATHANOR_RADARR_URL:-http://192.168.1.203:7878}
      ATHANOR_TAUTULLI_URL: ${ATHANOR_TAUTULLI_URL:-http://192.168.1.203:8181}
      ATHANOR_PLEX_URL: ${ATHANOR_PLEX_URL:-http://192.168.1.203:32400}
      ATHANOR_STASH_URL: ${ATHANOR_STASH_URL:-http://192.168.1.203:9999}
      ATHANOR_PROWLARR_URL: ${ATHANOR_PROWLARR_URL:-http://192.168.1.203:9696}
      ATHANOR_SABNZBD_URL: ${ATHANOR_SABNZBD_URL:-http://192.168.1.203:8080}
      ATHANOR_HOME_ASSISTANT_URL: ${ATHANOR_HOME_ASSISTANT_URL:-http://192.168.1.203:8123}
      ATHANOR_HOME_ASSISTANT_TOKEN: ${ATHANOR_HOME_ASSISTANT_TOKEN:-}
      ATHANOR_QDRANT_URL: ${ATHANOR_QDRANT_URL:-http://192.168.1.203:6333}
      ATHANOR_NEO4J_URL: ${ATHANOR_NEO4J_URL:-http://192.168.1.203:7474}
      ATHANOR_NEO4J_USER: ${ATHANOR_NEO4J_USER:-neo4j}
      ATHANOR_NEO4J_PASSWORD: ${ATHANOR_NEO4J_PASSWORD:-}
      ATHANOR_SPEACHES_URL: ${ATHANOR_SPEACHES_URL:-http://192.168.1.244:8200}
      ATHANOR_LITELLM_API_KEY: ${ATHANOR_LITELLM_API_KEY:-}
      ATHANOR_AGENT_API_TOKEN: ${ATHANOR_AGENT_API_TOKEN:-}
      ATHANOR_FOUNDRY_DOCKER_PROXY: ${ATHANOR_FOUNDRY_DOCKER_PROXY:-http://192.168.1.244:2375}
      ATHANOR_VAULT_DOCKER_PROXY: ${ATHANOR_VAULT_DOCKER_PROXY:-http://192.168.1.203:2375}

  ws-pty-bridge:
    build:
      context: ../ws-pty-bridge
      dockerfile: Dockerfile
    image: athanor/ws-pty-bridge:latest
    container_name: athanor-ws-pty-bridge
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - /home/athanor/.ssh:/home/node/.ssh:ro
    environment:
      - PORT=3100
      - HOME=/home/node
