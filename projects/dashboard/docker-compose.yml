services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: athanor/dashboard:latest
    container_name: athanor-dashboard
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_PROMETHEUS_URL: ${NEXT_PUBLIC_PROMETHEUS_URL:-http://192.168.1.203:9090}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-BFU67u2Kkj2yrC-ll29vulKVi1HR6qflEfLfPucaE5qDOG5Ojmka8NCaOs7QzDCTE4b8V5Apb5PFY8fCooOe2LA}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-dKpgcebzfa_qxgzL4g7SjoVpSJweWQcjx1C267wKsN4}
      ATHANOR_NODE1_HOST: ${ATHANOR_NODE1_HOST:-192.168.1.244}
      ATHANOR_NODE2_HOST: ${ATHANOR_NODE2_HOST:-192.168.1.225}
      ATHANOR_VAULT_HOST: ${ATHANOR_VAULT_HOST:-192.168.1.203}
      ATHANOR_AGENT_SERVER_URL: ${ATHANOR_AGENT_SERVER_URL:-http://192.168.1.244:9000}
      ATHANOR_PROMETHEUS_URL: ${ATHANOR_PROMETHEUS_URL:-http://192.168.1.203:9090}
      ATHANOR_GRAFANA_URL: ${ATHANOR_GRAFANA_URL:-http://192.168.1.203:3000}
      ATHANOR_NODE1_VLLM_URL: ${ATHANOR_NODE1_VLLM_URL:-http://192.168.1.244:8000}
      ATHANOR_NODE2_VLLM_URL: ${ATHANOR_NODE2_VLLM_URL:-http://192.168.1.225:8000}
      ATHANOR_LITELLM_URL: ${ATHANOR_LITELLM_URL:-http://192.168.1.203:4000}
      ATHANOR_COMFYUI_URL: ${ATHANOR_COMFYUI_URL:-http://192.168.1.225:8188}
      ATHANOR_OPEN_WEBUI_URL: ${ATHANOR_OPEN_WEBUI_URL:-http://192.168.1.225:3000}
      ATHANOR_SONARR_URL: ${ATHANOR_SONARR_URL:-http://192.168.1.203:8989}
      ATHANOR_RADARR_URL: ${ATHANOR_RADARR_URL:-http://192.168.1.203:7878}
      ATHANOR_TAUTULLI_URL: ${ATHANOR_TAUTULLI_URL:-http://192.168.1.203:8181}
      ATHANOR_PLEX_URL: ${ATHANOR_PLEX_URL:-http://192.168.1.203:32400}
      ATHANOR_STASH_URL: ${ATHANOR_STASH_URL:-http://192.168.1.203:9999}
      ATHANOR_SPEACHES_URL: ${ATHANOR_SPEACHES_URL:-http://192.168.1.244:8200}
      ATHANOR_LITELLM_API_KEY: ${ATHANOR_LITELLM_API_KEY:-sk-athanor-litellm-2026}

  ws-pty-bridge:
    build:
      context: ../ws-pty-bridge
      dockerfile: Dockerfile
    image: athanor/ws-pty-bridge:latest
    container_name: athanor-ws-pty-bridge
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - /home/athanor/.ssh:/home/node/.ssh:ro
    environment:
      - PORT=3100
      - HOME=/home/node
