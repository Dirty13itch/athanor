services:
  gpu-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    image: athanor/gpu-orchestrator:latest
    container_name: athanor-gpu-orchestrator
    restart: unless-stopped
    network_mode: host
    environment:
      - GPU_ORCH_REDIS_URL=${ATHANOR_REDIS_URL:-redis://192.168.1.203:6379/0}
      - GPU_ORCH_PORT=9200
      - GPU_ORCH_NODE1_IP=${ATHANOR_NODE1_HOST:-192.168.1.244}
      - GPU_ORCH_NODE2_IP=${ATHANOR_NODE2_HOST:-192.168.1.225}
      - GPU_ORCH_VLLM_NODE1_URL=${ATHANOR_VLLM_COORDINATOR_URL:-http://192.168.1.244:8000}
      - GPU_ORCH_VLLM_NODE1_EMBED_URL=${ATHANOR_VLLM_EMBEDDING_URL:-http://192.168.1.189:8001}
      - GPU_ORCH_VLLM_NODE2_URL=${ATHANOR_VLLM_WORKER_URL:-http://192.168.1.225:8000}
      - GPU_ORCH_DCGM_NODE1_URL=${GPU_ORCH_DCGM_NODE1_URL:-http://192.168.1.244:9400}
      - GPU_ORCH_DCGM_NODE2_URL=${GPU_ORCH_DCGM_NODE2_URL:-http://192.168.1.225:9400}
      - GPU_ORCH_PROMETHEUS_URL=${ATHANOR_PROMETHEUS_URL:-http://192.168.1.203:9090}
