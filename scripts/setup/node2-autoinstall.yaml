#cloud-config
autoinstall:
  version: 1

  locale: en_US.UTF-8
  keyboard:
    layout: us

  identity:
    hostname: interface
    username: athanor
    # Placeholder hash for "replace-me-now". Replace with a vaulted hash before use.
    password: "$6$rounds=656000$qA8Kb3Nu7YzFwjB/$Sn4S5CAhoMfI7O35KzV867iqktTkbXRH98FyGt0iQDA.aor4pEhEBS40L4RniYrbv.PE0ZYgdbh0ccCscjoOu0"

  ssh:
    install-server: true
    authorized-keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOhDZzvlXhHZ8Ar3GlIPFanLCgk+ojNX8DQAyOTyHqy/ athanor-management"
    allow-pw: false

  # Use DHCP during install for reliability — static IP configured post-install
  network:
    version: 2
    ethernets:
      any-eth:
        match:
          name: "en*"
        dhcp4: true

  # Install to first available NVMe — Node 2 has 4x Samsung 990 EVO Plus 1TB
  # Will use the first one; remaining 3 configured post-install
  storage:
    layout:
      name: lvm
      sizing-policy: all

  packages:
    - openssh-server
    - python3
    - python3-pip
    - lshw
    - smartmontools
    - pciutils
    - usbutils
    - dmidecode
    - htop
    - curl
    - wget
    - git
    - build-essential
    - linux-headers-generic
    - net-tools
    - nvme-cli

  late-commands:
    # Enable passwordless sudo for athanor user
    - echo 'athanor ALL=(ALL) NOPASSWD:ALL' > /target/etc/sudoers.d/athanor
    - chmod 440 /target/etc/sudoers.d/athanor

  user-data:
    disable_root: false
    timezone: America/Chicago
