services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: athanor/dashboard:latest
    container_name: athanor-dashboard
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_PROMETHEUS_URL=http://192.168.1.203:9090
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    mem_limit: 512m
