services:
  vllm:
    image: nvcr.io/nvidia/vllm:25.12-py3
    container_name: vllm
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - /mnt/vault/models:/models:ro
    environment:
      - HF_HUB_OFFLINE=1
      - VLLM_FLASH_ATTN_VERSION=2
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
    command:
      - --model
      - /models/Qwen3-32B-AWQ
      - --quantization
      - awq
      - --tensor-parallel-size
      - "4"
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - "32768"
      - --gpu-memory-utilization
      - "0.85"
      - --max-num-seqs
      - "128"
      - --dtype
      - auto
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
