# Phase 2 FOUNDRY vLLM: Coordinator (TP=4) + Utility
# Live config: /opt/athanor/vllm-phase2/docker-compose.yml on FOUNDRY
# Deploy: scp to FOUNDRY, docker compose up -d

services:
  coordinator:
    image: athanor/vllm:qwen35
    container_name: vllm-coordinator
    restart: unless-stopped
    network_mode: host
    volumes:
      - /mnt/vault/models:/models:ro
    environment:
      - HF_HUB_OFFLINE=1
      - VLLM_NO_USAGE_STATS=1
      - VLLM_DO_NOT_TRACK=1
      - DO_NOT_TRACK=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - FLASHINFER_DISABLE_VERSION_CHECK=1
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0", "1", "3", "4"]
              capabilities: [gpu]
    entrypoint: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
    command:
      - --model
      - /models/Qwen3.5-27B-FP8
      - --tensor-parallel-size
      - "4"
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - "32768"
      - --gpu-memory-utilization
      - "0.85"
      - --max-num-seqs
      - "64"
      - --enforce-eager
      - --language-model-only
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --kv-cache-dtype
      - auto
      - --enable-prefix-caching
      - --speculative-config
      - '{"method": "mtp", "num_speculative_tokens": 1}'
      - --safetensors-load-strategy
      - eager
      - --swap-space
      - "16"

  utility:
    image: athanor/vllm:qwen35
    container_name: vllm-utility
    restart: unless-stopped
    network_mode: host
    volumes:
      - /mnt/vault/models:/models:ro
    environment:
      - HF_HUB_OFFLINE=1
      - VLLM_NO_USAGE_STATS=1
      - VLLM_DO_NOT_TRACK=1
      - DO_NOT_TRACK=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - FLASHINFER_DISABLE_VERSION_CHECK=1
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["2"]
              capabilities: [gpu]
    entrypoint: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
    command:
      - --model
      - /models/Huihui-Qwen3-8B-abliterated-v2
      - --tensor-parallel-size
      - "1"
      - --host
      - 0.0.0.0
      - --port
      - "8002"
      - --max-model-len
      - "32768"
      - --gpu-memory-utilization
      - "0.90"
      - --max-num-seqs
      - "32"
      - --dtype
      - auto
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
      - --enable-prefix-caching
      - --safetensors-load-strategy
      - eager
