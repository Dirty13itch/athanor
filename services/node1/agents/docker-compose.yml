services:
  agents:
    build:
      context: .
      dockerfile: Dockerfile
    image: athanor/agents:latest
    container_name: athanor-agents
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      - ATHANOR_VLLM_BASE_URL=http://localhost:8000/v1
      - ATHANOR_VLLM_MODEL=/models/Qwen3-32B-AWQ
      - ATHANOR_PROMETHEUS_URL=http://192.168.1.203:9090
      - ATHANOR_PORT=9000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    mem_limit: 2g
