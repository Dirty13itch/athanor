# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
# Run: npx promptfoo@latest eval -c evals/pilot-agent-compare/goose-vs-direct-cli.yaml

description: "Athanor pilot: Goose vs direct CLI on bounded cloud-safe tasks"

commandLineOptions:
  maxConcurrency: 1
  cache: false

defaultTest:
  options:
    provider:
      id: openai:chat:deepseek
      config:
        apiBaseUrl: http://192.168.1.203:4000/v1
        apiKeyEnvar: LITELLM_API_KEY
        temperature: 0
        max_tokens: 1536
    transform: output.replace(/<think>[\s\S]*?<\/think>/g, '').replace(/^Thinking Process:[\s\S]*?\n\n/gm, '').trim()

providers:
  - id: file://providers/agent_command_provider.py
    label: Goose
    config:
      providerId: goose
      command: goose
      args:
        - run
        - --text
        - "{prompt}"
        - --provider
        - openai
        - --model
        - deepseek
        - --no-session
        - --no-profile
        - --quiet
        - --output-format
        - text
        - --max-turns
        - "1"
      stdinMode: none
      timeoutMs: 180000
      cwd: C:/
      stripAnsi: true
      stripMarkdownJsonFences: true
      envFrom:
        OPENAI_API_KEY: LITELLM_API_KEY
      env:
        OPENAI_HOST: http://192.168.1.203:4000
        OPENAI_BASE_PATH: v1/chat/completions

  - id: file://providers/agent_command_provider.py
    label: Direct CLI
    config:
      providerId: direct-cli
      command: codex
      args:
        - exec
        - --skip-git-repo-check
        - --sandbox
        - read-only
        - --color
        - never
        - --json
        - "-"
      stdinMode: prompt
      timeoutMs: 180000
      cwd: C:/
      stripAnsi: true
      extractJsonlField: item.text
      matchJsonlType: item.completed

prompts:
  - file://prompts/bounded-cloud-safe-task.txt

tests: file://tests/bounded-cloud-safe.yaml
