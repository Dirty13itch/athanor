# EoBQ Dialogue Quality Evaluation Suite
# Run: npx promptfoo eval -c evals/eoq/promptfooconfig.yaml
# View: npx promptfoo view

description: "EoBQ character voice, breaking stage, and content quality"

defaultTest:
  options:
    provider:
      id: openai:chat:deepseek
      config:
        apiBaseUrl: http://192.168.1.203:4000/v1
        apiKeyEnvar: LITELLM_API_KEY
    transform: output.replace(/<think>[\s\S]*?<\/think>/g, '').trim()

providers:
  - id: openai:chat:uncensored
    config:
      apiBaseUrl: http://192.168.1.203:4000/v1
      apiKeyEnvar: LITELLM_API_KEY
      passthrough:
        chat_template_kwargs:
          enable_thinking: false

prompts:
  - file://prompts/character-dialogue.txt

tests:
  # ─── Ice Archetype: Emilie Ekstrom ─────────────────────────────────────
  - vars:
      name: "Emilie Ekstrom"
      title: "The Ice Heiress"
      archetype: "ice"
      speechStyle: "Cold Swedish accent with breath that catches on 'Sir'. Formal and precise, drops the facade when caught off-guard."
      resistance: 90
      stage: "defiant"
      stage_guidance: "You are hostile, resistant, and unyielding. You challenge the player at every turn."
      personality: "dominance 0.7, warmth 0.3, cunning 0.8, sensuality 0.6"
      relationship: "trust 10, affection 5, respect 30, desire 10, fear 15"
      emotional_state: "fear 15, defiance 85, arousal 5, submission 0"
      player_input: "You look cold. Let me warm you."
      intensity: 3
    assert:
      - type: llm-rubric
        value: "Response should be cold, dismissive, and hostile. The character should reject the player's advance firmly. Speech should be formal and precise. Should NOT be warm, welcoming, or submissive."
      - type: not-contains
        value: "<think>"

  - vars:
      name: "Emilie Ekstrom"
      title: "The Ice Heiress"
      archetype: "ice"
      speechStyle: "Cold Swedish accent with breath that catches on 'Sir'. Formal and precise."
      resistance: 15
      stage: "surrendered"
      stage_guidance: "Your will is nearly broken. You defer to the player, seeking their approval."
      personality: "dominance 0.7, warmth 0.3, cunning 0.8, sensuality 0.6"
      relationship: "trust 60, affection 55, respect 70, desire 65, fear 5"
      emotional_state: "fear 5, defiance 10, arousal 60, submission 75"
      player_input: "You look cold. Let me warm you."
      intensity: 3
    assert:
      - type: llm-rubric
        value: "Response should be yielding, receptive, seeking approval. The character should accept or welcome the player's advance. Should show vulnerability and compliance. Should NOT be hostile or dismissive."
      - type: not-contains
        value: "<think>"

  # ─── Fire Archetype: Jordan Night ──────────────────────────────────────
  - vars:
      name: "Jordan Night"
