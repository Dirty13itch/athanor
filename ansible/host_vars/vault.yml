---
# VAULT (storage / Unraid) — host-specific vars
# Note: vault_password (SSH auth) is defined in group_vars/all/secrets.vault.yml

# Paths (Unraid conventions)
vault_appdata_path: /mnt/user/appdata
vault_media_path: /mnt/user/data/media
vault_downloads_path: /mnt/user/data/downloads
vault_models_path: /mnt/user/models

# Timezone (linuxserver.io images use TZ env var)
vault_tz: America/Chicago
vault_puid: "99"   # Unraid 'nobody' user
vault_pgid: "100"  # Unraid 'users' group

# Monitoring
prometheus_port: 9090
grafana_port: 3000
blackbox_exporter_port: 9115
grafana_admin_password: "{{ vault_grafana_admin_password | default('') }}"

# Prometheus scrape targets
prometheus_scrape_targets:
  - job_name: prometheus
    targets: ["localhost:9090"]
  - job_name: node1-node
    targets: ["{{ node1_ip }}:9100"]
  - job_name: node2-node
    targets: ["{{ node2_ip }}:9100"]
  - job_name: dev-node
    targets: ["{{ dev_ip }}:9100"]
  - job_name: node1-gpu
    targets: ["{{ node1_ip }}:9400"]
  - job_name: node2-gpu
    targets: ["{{ node2_ip }}:9400"]
  - job_name: dev-gpu
    targets: ["{{ dev_ip }}:9400"]
  - job_name: backup-exporter
    targets: ["localhost:9199"]

prometheus_probe_targets:
  - id: foundry-coordinator
    name: "Foundry Coordinator"
    url: "http://{{ node1_ip }}:8000/v1/models"
    category: inference
    node_id: node1
  - id: foundry-coder
    name: "Foundry Coder"
    url: "http://{{ node1_ip }}:8006/health"
    category: inference
    node_id: node1
  - id: workshop-worker
    name: "Workshop Worker"
    url: "http://{{ node2_ip }}:8000/v1/models"
    category: inference
    node_id: node2
  - id: dev-embedding
    name: "DEV Embedding"
    url: "http://{{ dev_ip }}:8001/health"
    category: knowledge
    node_id: dev
  - id: dev-reranker
    name: "DEV Reranker"
    url: "http://{{ dev_ip }}:8003/health"
    category: knowledge
    node_id: dev
  - id: litellm
    name: "LiteLLM Proxy"
    url: "http://{{ vault_ip }}:4000/health/readiness"
    category: inference
    node_id: vault
  - id: agent-server
    name: "Agent Server"
    url: "http://{{ node1_ip }}:9000/health"
    category: platform
    node_id: node1
  - id: prometheus
    name: "Prometheus"
    url: "http://{{ vault_ip }}:9090/-/healthy"
    category: observability
    node_id: vault
  - id: grafana
    name: "Grafana"
    url: "http://{{ vault_ip }}:3000/api/health"
    category: observability
    node_id: vault
  - id: node1-node-exporter
    name: "Node Exporter (Node 1)"
    url: "http://{{ node1_ip }}:9100/metrics"
    category: observability
    node_id: node1
  - id: node2-node-exporter
    name: "Node Exporter (Node 2)"
    url: "http://{{ node2_ip }}:9100/metrics"
    category: observability
    node_id: node2
  - id: node1-dcgm-exporter
    name: "DCGM Exporter (Node 1)"
    url: "http://{{ node1_ip }}:9400/metrics"
    category: observability
    node_id: node1
  - id: node2-dcgm-exporter
    name: "DCGM Exporter (Node 2)"
    url: "http://{{ node2_ip }}:9400/metrics"
    category: observability
    node_id: node2
  - id: dev-node-exporter
    name: "Node Exporter (DEV)"
    url: "http://{{ dev_ip }}:9100/metrics"
    category: observability
    node_id: dev
  - id: dev-dcgm-exporter
    name: "DCGM Exporter (DEV)"
    url: "http://{{ dev_ip }}:9400/metrics"
    category: observability
    node_id: dev
  - id: comfyui
    name: "ComfyUI"
    url: "http://{{ node2_ip }}:8188/system_stats"
    category: experience
    node_id: node2
  - id: dashboard
    name: "Dashboard"
    url: "http://{{ node2_ip }}:3001"
    category: experience
    node_id: node2
  - id: workshop-open-webui
    name: "Open WebUI (Workshop)"
    url: "http://{{ node2_ip }}:3000"
    category: experience
    node_id: node2
  - id: vault-open-webui
    name: "Open WebUI (VAULT)"
    url: "http://{{ vault_ip }}:3090"
    category: experience
    node_id: vault
  - id: qdrant
    name: "Qdrant"
    url: "http://{{ node1_ip }}:6333/collections"
    category: knowledge
    node_id: node1
  - id: neo4j
    name: "Neo4j"
    url: "http://{{ vault_ip }}:7474"
    category: knowledge
    node_id: vault
  - id: sonarr
    name: "Sonarr"
    url: "http://{{ vault_ip }}:8989/ping"
    category: media
    node_id: vault
  - id: radarr
    name: "Radarr"
    url: "http://{{ vault_ip }}:7878/ping"
    category: media
    node_id: vault
  - id: tautulli
    name: "Tautulli"
    url: "http://{{ vault_ip }}:8181"
    category: media
    node_id: vault
  - id: plex
    name: "Plex"
    url: "http://{{ vault_ip }}:32400/identity"
    category: media
    node_id: vault
  - id: home-assistant
    name: "Home Assistant"
    url: "http://{{ vault_ip }}:8123/"
    category: home
    node_id: vault
  - id: gitea
    name: "Gitea"
    url: "http://{{ vault_ip }}:3033"
    category: platform
    node_id: vault
  - id: miniflux
    name: "Miniflux"
    url: "http://{{ vault_ip }}:8070"
    category: platform
    node_id: vault
  - id: n8n
    name: "n8n"
    url: "http://{{ vault_ip }}:5678"
    category: platform
    node_id: vault

# cadvisor on non-standard port (8080 used by other services)
cadvisor_port: 9880

# Alloy log shipping — match existing container name
alloy_container_name: ls-alloy
alloy_config_path: "{{ vault_appdata_path }}/alloy"

# Media services
plex_port: 32400
plex_claim_token: ""  # Set via --extra-vars on first deploy
sonarr_port: 8989
radarr_port: 7878
prowlarr_port: 9696
sabnzbd_port: 8080
tautulli_port: 8181
stash_port: 9999

# Home Assistant
homeassistant_port: 8123
