# cadvisor on non-standard port (8080 used by other services)
cadvisor_port: 9880

# Alloy log shipping — match existing container name
alloy_container_name: ls-alloy
alloy_config_path: "{{ vault_appdata_path }}/alloy"

# Media services
plex_port: 32400
plex_claim_token: ""  # Set via --extra-vars on first deploy
sonarr_port: 8989
radarr_port: 7878
prowlarr_port: 9696
sabnzbd_port: 8080
tautulli_port: 8181
stash_port: 9999

# Home Assistant
homeassistant_port: 8123
