---
# Node 2 (interface / Workshop) — host-specific vars

vllm_model: /models/Qwen3.5-35B-A3B-AWQ-4bit
vllm_quantization: awq  # Explicit AWQ required on Blackwell (sm_120)
vllm_tensor_parallel: 1
vllm_port: 8000
vllm_gpu_memory_util: "0.90"
vllm_max_model_len: 32768
vllm_max_num_seqs: 32
vllm_gpu_devices: "0"
vllm_container_name: vllm-node2
vllm_deploy_dir: /opt/athanor/vllm-node2
vllm_dtype: auto
vllm_extra_env:
  - "NVIDIA_VISIBLE_DEVICES=0"
  - "CUDA_VISIBLE_DEVICES=0"
vllm_extra_args:
  - --language-model-only
  - --enable-auto-tool-choice
  - --tool-call-parser
  - qwen3_xml
  - --kv-cache-dtype
  - auto
  - --max-num-batched-tokens
  - "2096"
  - --enable-prefix-caching
  # NFS optimization: eager loading converts random page faults to sequential reads
  - --safetensors-load-strategy
  - eager

# Custom vLLM image: NGC CUDA 13.1 base + nightly vLLM (Qwen3.5 support)
# Upstream cu130 image fails with CUDA 13.0 vs Blackwell driver mismatch — NGC 13.1 base required
vllm_custom_build: true
vllm_base_image: "nvcr.io/nvidia/vllm:26.01-py3"
vllm_pip_version: ""  # Empty = nightly (latest, unpinned) for Qwen3.5 qwen3_5 model type

# Network interfaces — 10GbE primary + DHCP secondary
network_interfaces:
  - name: eno1
    addresses: ["192.168.1.225/24"]
    gateway: true
    mtu: 9000
  - name: enp71s0
    dhcp: true
    dhcp_overrides:
      route-metric: 200
    mtu: 1500

comfyui_gpu_device: "1"
comfyui_port: 8188

open_webui_port: 3000
open_webui_vllm_url: "http://{{ node1_ip }}:8000/v1"

dashboard_port: 3001
dashboard_prometheus_url: "{{ prometheus_url }}"
