---
# Node 2 (interface / Workshop) — host-specific vars

vllm_model: /models/Qwen3.5-35B-A3B-AWQ-4bit
vllm_quantization: ""  # Model uses compressed-tensors quant — vLLM auto-detects from config.json
vllm_tensor_parallel: 1
vllm_port: 8010
vllm_gpu_memory_util: "0.85"
vllm_max_model_len: 32768
vllm_max_num_seqs: 32
vllm_gpu_devices: "0"
vllm_container_name: vllm-node2
vllm_deploy_dir: /opt/athanor/vllm-node2
vllm_dtype: auto
vllm_extra_env:
  - "NVIDIA_VISIBLE_DEVICES=0"
  - "CUDA_VISIBLE_DEVICES=0"
  - "FLASHINFER_DISABLE_VERSION_CHECK=1"
vllm_extra_volumes:
  - /home/athanor/.cache/triton:/root/.cache/triton
vllm_extra_args:
  - --enforce-eager  # Qwen3.5 DeltaNet Triton kernels OOM during CUDA graph capture
  - --enable-auto-tool-choice
  - --tool-call-parser
  - qwen3_xml
  - --kv-cache-dtype
  - auto
  - --max-num-batched-tokens
  - "2096"
  - --enable-prefix-caching
  # NFS optimization: eager loading converts random page faults to sequential reads
  - --safetensors-load-strategy
  - eager

# Use the pinned prebuilt image shared with Foundry instead of rebuilding the
# floating qwen35 tag independently on Workshop.
vllm_custom_build: false
vllm_image: "athanor/vllm:qwen35-20260315"

# Network interfaces — 5GbE primary + DHCP secondary
network_interfaces:
  - name: eno1
    addresses: ["192.168.1.225/24"]
    gateway: true
    mtu: 9000
  - name: enp71s0
    dhcp: true
    dhcp_overrides:
      route-metric: 200
    mtu: 1500

# Alloy log shipping
alloy_node_name: workshop

comfyui_gpu_device: "1"
comfyui_port: 8188

open_webui_port: 3000
open_webui_vllm_url: "http://{{ node1_ip }}:8000/v1"

dashboard_port: 3001
dashboard_prometheus_url: "http://{{ vault_ip | default('192.168.1.203') }}:9090"
