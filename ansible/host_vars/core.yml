---
# Node 1 (core / Foundry) — host-specific vars

# Per-GPU power limits (mixed GPU config: 4x RTX 5070 Ti + RTX 4090)
# GPU order verified via nvidia-smi 2026-02-24
nvidia_gpu_power_limits:
  - { index: 0, watts: 250 }   # RTX 5070 Ti (PCI 01:00) — min 250W, max 300W
  - { index: 1, watts: 250 }   # RTX 5070 Ti (PCI 02:00)
  - { index: 2, watts: 320 }   # RTX 4090 (PCI 81:00) — min 100W, max 450W
  - { index: 3, watts: 250 }   # RTX 5070 Ti (PCI 82:00)
  - { index: 4, watts: 250 }   # RTX 5070 Ti (PCI C1:00, embedding)

vllm_model: /models/Qwen3.5-27B-FP8
vllm_quantization: ""
vllm_tensor_parallel: 4
vllm_port: 8000
vllm_gpu_memory_util: "0.90"
vllm_max_model_len: 32768
vllm_max_num_seqs: 64
vllm_gpu_devices: all
vllm_extra_args:
  - --language-model-only
  - --enable-auto-tool-choice
  - --tool-call-parser
  - qwen3_xml
  # NFS optimization: eager loading converts random page faults to sequential reads (2-5x faster model load)
  - --safetensors-load-strategy
  - eager
  # Swap space for preemption recovery (16 GiB per GPU, uses system RAM)
  - --swap-space
  - "16"
# Speculative decoding — Qwen3-0.6B as draft model, 2-3x throughput for ~1.2 GB extra VRAM
# Uncomment to enable (requires vLLM restart):
# vllm_speculative_config: '{"model": "/models/Qwen3-0.6B", "num_speculative_tokens": 5}'

# Custom vLLM image: NGC CUDA 13.1 base + nightly vLLM (Qwen3.5 support)
# Upstream cu130 image fails with CUDA 13.0 vs Blackwell driver mismatch — NGC 13.1 base required
vllm_custom_build: true
vllm_base_image: "nvcr.io/nvidia/vllm:26.01-py3"
vllm_pip_version: ""  # Empty = nightly (latest, unpinned) for Qwen3.5 qwen3_5 model type

# Network interfaces — dual 10GbE NICs, MTU 9000
network_interfaces:
  - name: enp66s0f0
    addresses: ["192.168.1.244/24"]
    gateway: true
    mtu: 9000
  - name: enp66s0f1
    addresses: ["192.168.1.246/24"]
    gateway: false
    mtu: 9000
    routes:
      - to: "192.168.1.0/24"
        scope: link
        metric: 200

# Agent config — API keys and LiteLLM routing in roles/agents/defaults/main.yml
