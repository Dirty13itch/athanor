---
# Node 1 (core / Foundry) — host-specific vars

# GPU power limits (250W = hardware minimum for RTX 5070 Ti; creates headroom for RTX 3060 within 1600W PSU)
nvidia_power_limit_watts: 250

vllm_model: /models/Qwen3-32B-AWQ
vllm_quantization: awq
vllm_tensor_parallel: 4
vllm_port: 8000
vllm_gpu_memory_util: "0.85"
vllm_max_model_len: 32768
vllm_max_num_seqs: 128
vllm_gpu_devices: all
vllm_extra_args: "--enable-auto-tool-choice --tool-call-parser hermes"

agent_port: 9000
