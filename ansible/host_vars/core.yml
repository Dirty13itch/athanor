---
# Node 1 (core / Foundry) — host-specific vars

# Per-GPU power limits (mixed GPU config: RTX 4090 + 4x RTX 5070 Ti)
nvidia_gpu_power_limits:
  - { index: 0, watts: 320 }   # RTX 4090 (slot 1)
  - { index: 1, watts: 240 }   # RTX 5070 Ti (slot 2)
  - { index: 2, watts: 240 }   # RTX 5070 Ti (slot 3)
  - { index: 3, watts: 240 }   # RTX 5070 Ti (slot 4)
  - { index: 4, watts: 240 }   # RTX 5070 Ti (slot 5)

vllm_model: /models/Qwen3-32B-AWQ
vllm_quantization: awq
vllm_tensor_parallel: 4
vllm_port: 8000
vllm_gpu_memory_util: "0.85"
vllm_max_model_len: 32768
vllm_max_num_seqs: 128
vllm_gpu_devices: all
vllm_extra_args:
  - --enable-auto-tool-choice
  - --tool-call-parser
  - hermes

agent_port: 9000
agent_vllm_url: "http://localhost:8000/v1"
agent_vllm_model: /models/Qwen3-32B-AWQ
agent_prometheus_url: "{{ prometheus_url }}"
agent_sonarr_api_key: "{{ vault_agent_sonarr_api_key }}"
agent_radarr_api_key: "{{ vault_agent_radarr_api_key }}"
agent_tautulli_api_key: "{{ vault_agent_tautulli_api_key }}"
