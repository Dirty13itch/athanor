---
# Node 1 (core / Foundry) â€” host-specific vars

# Per-GPU power limits (mixed GPU config: 4x RTX 5070 Ti + RTX 4090)
# GPU order verified via nvidia-smi 2026-02-24
nvidia_gpu_power_limits:
  - { index: 0, watts: 250 }   # RTX 5070 Ti (PCI 01:00) â€” min 250W, max 300W
  - { index: 1, watts: 250 }   # RTX 5070 Ti (PCI 02:00)
  - { index: 2, watts: 320 }   # RTX 4090 (PCI 81:00) â€” min 100W, max 450W
  - { index: 3, watts: 250 }   # RTX 5070 Ti (PCI 82:00)
  - { index: 4, watts: 250 }   # RTX 5070 Ti (PCI C1:00, embedding)

# vLLM image build settings (shared by all instances)
vllm_custom_build: true
vllm_base_image: "nvcr.io/nvidia/vllm:26.01-py3"
vllm_pip_version: ""  # Empty = nightly for Qwen3.5
vllm_custom_image_tag: "qwen35"
vllm_models_volume: "/mnt/local-fast/models:/models:ro"

# Multi-instance vLLM: coordinator (TP=4 on 4x 5070 Ti) + coder (4090)
vllm_instances:
  - name: coordinator
    container_name: vllm-coordinator
    model: /models/Qwen3.5-27B-FP8
    port: 8000
    max_model_len: 131072
    tensor_parallel: 4
    gpu_devices: ["0", "1", "3", "4"]
    network_mode: host
    extra_volumes:
      - /home/athanor/.cache/triton:/root/.cache/triton
    speculative_config: '{"method": "mtp", "num_speculative_tokens": 1}'
    extra_args:
      - --enforce-eager
      - --language-model-only
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --kv-cache-dtype
      - auto
      - --enable-prefix-caching
      - --safetensors-load-strategy
      - eager
      - --swap-space
      - "16"

  - name: coder
    container_name: vllm-coder
    model: /models/Qwen3.5-35B-A3B-AWQ-4bit
    served_model_name: qwen35-coder
    port: 8006
    internal_port: 8000
    max_model_len: 65536
    gpu_devices: ["2"]
    gpu_memory_util: "0.92"
    max_num_seqs: 16
    shm_size: "8g"
    models_volume: "/mnt/local-fast/models:/models"
    extra_volumes:
      - /home/athanor/.cache/triton:/root/.cache/triton
    extra_args:
      - --enforce-eager
      - --language-model-only
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      - --kv-cache-dtype
      - auto
      - --enable-prefix-caching
      - --safetensors-load-strategy
      - eager

# Network interfaces â€” dual 5GbE NICs, MTU 9000
network_interfaces:
  - name: enp66s0f0
    addresses: ["192.168.1.244/24"]
    gateway: true
    mtu: 9000
  - name: enp66s0f1
    addresses: ["192.168.1.246/24"]
    gateway: false
    mtu: 9000
    routes:
      - to: "192.168.1.0/24"
        scope: link
        metric: 200

# Alloy log shipping
alloy_node_name: foundry

# Durable control-plane persistence
athanor_postgres_port: 5434
athanor_postgres_db: athanor
athanor_postgres_url: "postgresql://langfuse:{{ vault_langfuse_pg_password | urlencode }}@{{ vault_ip }}:{{ athanor_postgres_port }}/{{ athanor_postgres_db }}"

# Agent config â€” API keys and LiteLLM routing in roles/agents/defaults/main.yml
