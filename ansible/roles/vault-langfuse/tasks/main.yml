---
- name: Create LangFuse deploy directory
  file:
    path: "{{ langfuse_deploy_dir }}"
    state: directory
    mode: "0755"

- name: Deploy LangFuse docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ langfuse_deploy_dir }}/docker-compose.yml"
    mode: "0644"
  register: langfuse_compose

- name: Pull LangFuse images
  community.docker.docker_compose_v2_pull:
    project_src: "{{ langfuse_deploy_dir }}"

- name: Start LangFuse stack
  community.docker.docker_compose_v2:
    project_src: "{{ langfuse_deploy_dir }}"
    state: present
    remove_orphans: true
  register: langfuse_result

- name: Restart LangFuse if config changed
  community.docker.docker_compose_v2:
    project_src: "{{ langfuse_deploy_dir }}"
    state: restarted
  when: langfuse_compose.changed and not langfuse_result.changed

- name: Check whether the Athanor Postgres database already exists
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - langfuse-postgres
      - psql
      - -U
      - "{{ langfuse_pg_user }}"
      - -d
      - postgres
      - -tAc
      - "SELECT 1 FROM pg_database WHERE datname='{{ athanor_postgres_db }}';"
  register: athanor_postgres_exists
  changed_when: false

- name: Ensure Athanor Postgres database exists
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - langfuse-postgres
      - createdb
      - -U
      - "{{ langfuse_pg_user }}"
      - -O
      - "{{ langfuse_pg_user }}"
      - "{{ athanor_postgres_db }}"
  when: "'1' not in athanor_postgres_exists.stdout"

- name: Wait for LangFuse web to be healthy
  uri:
    url: "http://localhost:{{ langfuse_port }}/api/public/health"
    method: GET
    status_code: 200
  register: langfuse_health
  retries: 30
  delay: 10
  until: langfuse_health.status == 200
