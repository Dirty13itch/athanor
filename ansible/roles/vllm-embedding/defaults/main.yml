---
vllm_embedding_image: "nvcr.io/nvidia/vllm:25.12-py3"
vllm_embedding_container_name: vllm-embedding
vllm_embedding_model: /models/Qwen3-Embedding-8B-FP8-DYNAMIC
vllm_embedding_served_model_name: qwen3-embed-8b
vllm_embedding_port: 8001
vllm_embedding_gpu_device: "0"
vllm_embedding_gpu_memory_util: "0.45"
vllm_embedding_max_model_len: 8192
vllm_embedding_max_num_seqs: 256
vllm_embedding_dtype: auto
vllm_embedding_deploy_dir: /opt/athanor/vllm-embedding

vllm_reranker_container_name: vllm-reranker
vllm_reranker_model: /models/Qwen3-Reranker-0.6B
vllm_reranker_port: 8003
vllm_reranker_gpu_device: "{{ vllm_embedding_gpu_device }}"
vllm_reranker_gpu_memory_util: "0.20"
vllm_reranker_max_model_len: 8192
vllm_reranker_max_num_seqs: 64
vllm_reranker_dtype: auto
