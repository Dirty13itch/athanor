---
# Common setup for all compute nodes

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create NFS mount directories
  ansible.builtin.file:
    path: "{{ item.dest }}"
    state: directory
    mode: "0755"
  loop: "{{ nfs_mounts }}"
  register: nfs_dir_result
  failed_when: >-
    nfs_dir_result is failed and
    'File exists' not in (nfs_dir_result.msg | default(''))

- name: Check NFS mount health
  ansible.builtin.command:
    cmd: "stat {{ item.dest }}"
  loop: "{{ nfs_mounts }}"
  register: nfs_health
  failed_when: false
  changed_when: false
  check_mode: false

- name: Force unmount stale NFS mounts
  ansible.builtin.command:
    cmd: "umount -f {{ item.item.dest }}"
  loop: "{{ nfs_health.results }}"
  when: item.rc != 0 and 'Stale file handle' in (item.stderr | default(''))
  changed_when: true

- name: Mount NFS shares
  ansible.posix.mount:
    src: "{{ item.src }}"
    path: "{{ item.dest }}"
    fstype: nfs
    opts: "{{ nfs_options }}"
    state: mounted
  loop: "{{ nfs_mounts }}"
  register: nfs_mount_result
  failed_when: >-
    nfs_mount_result is failed and
    'File exists' not in (nfs_mount_result.msg | default(''))

- name: Configure UFW defaults
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Allow UFW ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ firewall_allow + (extra_firewall | default([])) }}"

- name: Ensure cluster hostnames in /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '.*\b{{ item.name }}\b'
    line: >-
      {{ item.ip }} {{ item.name }}{% if (item.aliases | default([])) | length > 0 %}
      {{ item.aliases | join(' ') }}{% endif %}
    state: present
  loop: "{{ cluster_hosts }}"

- name: Apply kernel tuning for 5GbE and inference workloads
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop:
    # TCP buffer sizes for 5GbE NFS performance
    - { key: "net.core.rmem_max", value: "16777216" }
    - { key: "net.core.wmem_max", value: "16777216" }
    - { key: "net.ipv4.tcp_rmem", value: "4096 1048576 16777216" }
    - { key: "net.ipv4.tcp_wmem", value: "4096 1048576 16777216" }
    # Lower swappiness for inference workloads (keep models in RAM)
    - { key: "vm.swappiness", value: "10" }
    # Increase max open files system-wide
    - { key: "fs.file-max", value: "2097152" }
