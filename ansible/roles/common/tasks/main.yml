---
# Common setup for all compute nodes

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create NFS mount directories
  ansible.builtin.file:
    path: "{{ item.dest }}"
    state: directory
    mode: "0755"
  loop: "{{ nfs_mounts }}"
  register: nfs_dir_result
  failed_when: >-
    nfs_dir_result is failed and
    'File exists' not in (nfs_dir_result.msg | default(''))

- name: Mount NFS shares
  ansible.posix.mount:
    src: "{{ item.src }}"
    path: "{{ item.dest }}"
    fstype: nfs
    opts: "{{ nfs_options }}"
    state: mounted
  loop: "{{ nfs_mounts }}"

- name: Configure UFW defaults
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Allow UFW ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ firewall_allow }}"
