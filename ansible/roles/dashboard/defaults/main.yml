---
dashboard_deploy_dir: /opt/athanor/dashboard
dashboard_port: 3001
dashboard_prometheus_url: "{{ prometheus_url }}"
dashboard_image: "athanor/dashboard:latest"
dashboard_surface_mode: "canonical_production"
dashboard_legacy_systemd_service_name: "athanor-dashboard.service"
dashboard_disable_legacy_systemd_service: "{{ dashboard_surface_mode == 'canonical_production' }}"
dashboard_verify_runtime_contract: true
dashboard_static_asset_verify_count: 4
dashboard_expected_api_paths:
  - /api/operator/context
  - /api/operator/session
  - /api/operator/nav-attention
  - /api/operator/ui-preferences
dashboard_command_center_url: "https://athanor.local"
dashboard_workshop_link_host: "interface.athanor.local"
dashboard_vault_link_host: "vault.athanor.local"
dashboard_vapid_public_key: ""
dashboard_vapid_private_key: ""

dashboard_node1_host: "{{ node1_ip | default('192.168.1.244') }}"
dashboard_node2_host: "{{ node2_ip | default('192.168.1.225') }}"
dashboard_vault_host: "{{ vault_ip | default('192.168.1.203') }}"
dashboard_dev_host: "{{ dev_ip | default('192.168.1.189') }}"

dashboard_agent_server_url: "http://{{ node1_ip | default('192.168.1.244') }}:9000"
dashboard_grafana_url: "{{ grafana_url }}"
dashboard_litellm_url: "http://{{ vault_ip | default('192.168.1.203') }}:4000"
dashboard_vllm_coordinator_url: "http://{{ node1_ip | default('192.168.1.244') }}:8000"
dashboard_vllm_coder_url: "http://{{ node1_ip | default('192.168.1.244') }}:8006"
dashboard_vllm_worker_url: "http://{{ node2_ip | default('192.168.1.225') }}:8010"
dashboard_vllm_embedding_url: "http://{{ dev_ip | default('192.168.1.189') }}:8001"
dashboard_vllm_reranker_url: "http://{{ dev_ip | default('192.168.1.189') }}:8003"
dashboard_comfyui_url: "http://{{ node2_ip | default('192.168.1.225') }}:8188"
dashboard_open_webui_url: "http://{{ node2_ip | default('192.168.1.225') }}:3000"
dashboard_vault_open_webui_url: "http://{{ vault_ip | default('192.168.1.203') }}:3090"
dashboard_eoq_url: "http://{{ node2_ip | default('192.168.1.225') }}:3002"
dashboard_sonarr_url: "http://{{ vault_ip | default('192.168.1.203') }}:{{ sonarr_port | default('8989') }}"
dashboard_radarr_url: "http://{{ vault_ip | default('192.168.1.203') }}:{{ radarr_port | default('7878') }}"
dashboard_tautulli_url: "http://{{ vault_ip | default('192.168.1.203') }}:{{ tautulli_port | default('8181') }}"
dashboard_plex_url: "http://{{ vault_ip | default('192.168.1.203') }}:{{ plex_port | default('32400') }}"
dashboard_stash_url: "http://{{ vault_ip | default('192.168.1.203') }}:{{ stash_port | default('9999') }}"
dashboard_prowlarr_url: "http://{{ vault_ip | default('192.168.1.203') }}:{{ prowlarr_port | default('9696') }}"
dashboard_sabnzbd_url: "http://{{ vault_ip | default('192.168.1.203') }}:{{ sabnzbd_port | default('8080') }}"
dashboard_home_assistant_url: "http://{{ vault_ip | default('192.168.1.203') }}:{{ home_assistant_port | default('8123') }}"
dashboard_qdrant_url: "http://{{ vault_ip | default('192.168.1.203') }}:6333"
dashboard_neo4j_url: "http://{{ vault_ip | default('192.168.1.203') }}:7474"
dashboard_neo4j_user: "neo4j"
dashboard_neo4j_password: "{{ athanor_neo4j_password | default(neo4j_password | default('')) }}"
dashboard_speaches_url: "http://{{ node1_ip | default('192.168.1.244') }}:8200"
dashboard_litellm_api_key: "{{ athanor_litellm_api_key | default(agent_litellm_api_key | default('')) }}"
dashboard_agent_api_token: "{{ athanor_agent_api_token | default('') }}"
dashboard_operator_token: "{{ athanor_dashboard_operator_token | default('') }}"
dashboard_langfuse_public_key: "{{ athanor_langfuse_public_key | default('') }}"
dashboard_langfuse_secret_key: "{{ athanor_langfuse_secret_key | default('') }}"
dashboard_ws_pty_bridge_allowed_nodes: "workshop,foundry,dev"
dashboard_bind_docker_socket: "{{ dashboard_surface_mode == 'shadow_recovery' }}"
dashboard_docker_group_gid: "988"
dashboard_include_ws_pty_bridge: "{{ dashboard_surface_mode == 'shadow_recovery' }}"
dashboard_ws_pty_bridge_dir: /opt/athanor/ws-pty-bridge
dashboard_ws_pty_bridge_port: 3100
dashboard_ws_pty_bridge_image: "athanor/ws-pty-bridge:latest"
dashboard_ws_pty_bridge_ssh_dir: /home/athanor/.ssh
