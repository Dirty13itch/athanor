---
- name: Create face-tagger deploy directory
  ansible.builtin.file:
    path: "{{ face_tagger_deploy_dir }}"
    state: directory
    mode: "0755"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ face_tagger_deploy_dir }}/docker-compose.yml"
    mode: "0644"

- name: Deploy Dockerfile
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "{{ face_tagger_deploy_dir }}/Dockerfile"
    mode: "0644"

- name: Copy face tagger script
  ansible.builtin.copy:
    src: stash-face-tagger.py
    dest: "{{ face_tagger_deploy_dir }}/stash-face-tagger.py"
    mode: "0755"

- name: Build face-tagger container
  community.docker.docker_compose_v2:
    project_src: "{{ face_tagger_deploy_dir }}"
    build: always
    state: present
    # Don't start — it's a one-shot job triggered by timer
    stopped: true

- name: Deploy systemd timer
  ansible.builtin.template:
    src: face-tagger.timer.j2
    dest: /etc/systemd/system/face-tagger.timer
    mode: "0644"
  notify: reload systemd

- name: Deploy systemd service
  ansible.builtin.template:
    src: face-tagger.service.j2
    dest: /etc/systemd/system/face-tagger.service
    mode: "0644"
  notify: reload systemd

- name: Enable face-tagger timer
  ansible.builtin.systemd:
    name: face-tagger.timer
    enabled: true
    state: started
    daemon_reload: true
