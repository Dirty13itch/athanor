---
- name: Create vLLM deploy directory
  ansible.builtin.file:
    path: "{{ vllm_deploy_dir }}"
    state: directory
    owner: athanor
    group: athanor
    mode: "0755"

- name: Deploy vLLM Dockerfile (custom build)
  ansible.builtin.template:
    src: Dockerfile.j2
    dest: "{{ vllm_deploy_dir }}/Dockerfile"
    owner: athanor
    group: athanor
    mode: "0644"
  register: vllm_dockerfile
  when: vllm_custom_build

- name: Deploy vLLM Qwen3.5 patch script (custom build)
  ansible.builtin.copy:
    src: fix-vllm-qwen35.py
    dest: "{{ vllm_deploy_dir }}/fix-vllm-qwen35.py"
    owner: athanor
    group: athanor
    mode: "0644"
  when: vllm_custom_build

- name: Deploy vLLM docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ vllm_deploy_dir }}/docker-compose.yml"
    owner: athanor
    group: athanor
    mode: "0644"
  register: vllm_compose

# NGC mode: pull pre-built image
- name: Pull vLLM image (NGC)
  community.docker.docker_compose_v2_pull:
    project_src: "{{ vllm_deploy_dir }}"
  when: not vllm_custom_build

# Custom build mode: stop before rebuild if Dockerfile changed
- name: Stop vLLM before rebuild
  community.docker.docker_compose_v2:
    project_src: "{{ vllm_deploy_dir }}"
    state: absent
  when: vllm_custom_build and (vllm_dockerfile.changed | default(false))

# Custom build mode: always build + recreate (Docker cache makes builds fast,
# recreate ensures container matches latest image even if configs didn't change this run)
- name: Build and deploy vLLM (custom)
  community.docker.docker_compose_v2:
    project_src: "{{ vllm_deploy_dir }}"
    state: present
    build: always
    recreate: always
  when: vllm_custom_build

# NGC mode: deploy (no build)
- name: Deploy vLLM (NGC)
  community.docker.docker_compose_v2:
    project_src: "{{ vllm_deploy_dir }}"
    state: present
    recreate: "{{ 'always' if vllm_compose.changed else 'never' }}"
  when: not vllm_custom_build

- name: Wait for vLLM instance health
  ansible.builtin.uri:
    url: "http://localhost:{{ item.port }}/health"
    status_code: 200
  register: vllm_instance_health
  retries: 30
  delay: 10
  until: vllm_instance_health.status == 200
  loop: "{{ vllm_instances }}"
  loop_control:
    label: "{{ item.name }}"
  when: vllm_instances | default([]) | length > 0 and not ansible_check_mode

- name: Wait for vLLM health
  ansible.builtin.uri:
    url: "http://localhost:{{ vllm_port }}/health"
    status_code: 200
  register: vllm_health
  retries: 30
  delay: 10
  until: vllm_health.status == 200
  when: vllm_instances | default([]) | length == 0 and not ansible_check_mode
