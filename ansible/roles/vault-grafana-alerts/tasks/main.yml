---
# Deploy Grafana alert rules and the backup age exporter used by Prometheus.

# --- Grafana alerting provisioning ---

- name: Create Grafana alerting provisioning directory
  ansible.builtin.file:
    path: "{{ grafana_alerting_path }}"
    state: directory
    mode: "0755"
    owner: "472"
    group: "472"

- name: Deploy backup alert rules
  ansible.builtin.template:
    src: backup-alerts.yml.j2
    dest: "{{ grafana_alerting_path }}/backup-alerts.yml"
    mode: "0644"
    owner: "472"
    group: "472"
  register: backup_alerts_config

# --- Standalone backup age exporter (Python HTTP on :9199) ---

- name: Deploy backup age exporter script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../scripts/backup-age-exporter.py"
    dest: /opt/athanor/scripts/backup-age-exporter.py
    mode: "0755"
  register: backup_exporter_script

# Note: VAULT runs Unraid (no systemd). The backup-age-exporter runs as a
# Docker container (deployed manually or via community.docker.docker_container).
# The systemd tasks below are skipped on VAULT.

# Unraid's Python lacks 'requests' so community.docker modules fail.
# Use raw docker CLI instead for VAULT deployments.
- name: Deploy backup age exporter as Docker container
  ansible.builtin.raw: >
    docker rm -f backup-exporter 2>/dev/null;
    docker run -d
    --name backup-exporter
    --restart unless-stopped
    --network host
    -v /opt/athanor/scripts/backup-age-exporter.py:/app/exporter.py:ro
    -v {{ qdrant_backup_dir }}:/backups/qdrant:ro
    -v {{ neo4j_backup_dir }}:/backups/neo4j:ro
    -v {{ appdata_backup_dir }}:/backups/appdata:ro
    -e ATHANOR_QDRANT_BACKUP_DIR=/backups/qdrant
    -e ATHANOR_QDRANT_BACKUP_FALLBACK_DIR=""
    -e ATHANOR_NEO4J_BACKUP_DIR=/backups/neo4j
    -e ATHANOR_APPDATA_BACKUP_DIR=/backups/appdata
    -e ATHANOR_APPDATA_BACKUP_FALLBACK_DIR=""
    python:3.12-slim python3 /app/exporter.py
  changed_when: true
  when: not ansible_check_mode

# --- Ensure Grafana has provisioning volume mounted ---
# The vault-monitoring role creates the Grafana container without provisioning.
# This task updates it to mount the provisioning directory so alert rules load.

# Restart Grafana to pick up new alert provisioning files
- name: Restart Grafana to load alert rules
  ansible.builtin.raw: docker restart grafana
  when: backup_alerts_config.changed | default(false)
