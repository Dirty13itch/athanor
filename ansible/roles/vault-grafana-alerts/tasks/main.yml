---
# Deploy Grafana alert rules and the backup age exporter used by Prometheus.

# --- Grafana alerting provisioning ---

- name: Create Grafana alerting provisioning directory
  ansible.builtin.file:
    path: "{{ grafana_alerting_path }}"
    state: directory
    mode: "0755"
    owner: "472"
    group: "472"

- name: Deploy backup alert rules
  ansible.builtin.template:
    src: backup-alerts.yml.j2
    dest: "{{ grafana_alerting_path }}/backup-alerts.yml"
    mode: "0644"
    owner: "472"
    group: "472"
  register: backup_alerts_config

# --- Standalone backup age exporter (Python HTTP on :9199) ---

- name: Deploy backup age exporter script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../scripts/backup-age-exporter.py"
    dest: /opt/athanor/scripts/backup-age-exporter.py
    mode: "0755"
  register: backup_exporter_script

# Note: VAULT runs Unraid (no systemd). The backup-age-exporter runs as a
# Docker container (deployed manually or via community.docker.docker_container).
# The systemd tasks below are skipped on VAULT.

- name: Deploy backup age exporter as Docker container
  community.docker.docker_container:
    name: backup-exporter
    image: python:3.12-slim
    state: started
    restart_policy: unless-stopped
    network_mode: host
    volumes:
      - /opt/athanor/scripts/backup-age-exporter.py:/app/exporter.py:ro
      - "{{ qdrant_backup_dir }}:/backups/qdrant:ro"
      - "{{ neo4j_backup_dir }}:/backups/neo4j:ro"
      - "{{ appdata_backup_dir }}:/backups/appdata:ro"
    env:
      ATHANOR_QDRANT_BACKUP_DIR: /backups/qdrant
      ATHANOR_QDRANT_BACKUP_FALLBACK_DIR: ""
      ATHANOR_NEO4J_BACKUP_DIR: /backups/neo4j
      ATHANOR_APPDATA_BACKUP_DIR: /backups/appdata
      ATHANOR_APPDATA_BACKUP_FALLBACK_DIR: ""
    command: python3 /app/exporter.py
  when: not ansible_check_mode

# --- Ensure Grafana has provisioning volume mounted ---
# The vault-monitoring role creates the Grafana container without provisioning.
# This task updates it to mount the provisioning directory so alert rules load.

- name: Ensure Grafana container has provisioning volume
  community.docker.docker_container:
    name: grafana
    image: "{{ grafana_image | default('grafana/grafana:latest') }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ grafana_port | default('3000') }}:3000"
    volumes:
      - "{{ grafana_data_path }}:/var/lib/grafana"
      - "{{ grafana_provisioning_path }}:/etc/grafana/provisioning:ro"
    env:
      GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password | default('') }}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_ALERTING_ENABLED: "false"
    restart: "{{ backup_alerts_config.changed | default(false) }}"
  when: not ansible_check_mode
