---
litellm_image: ghcr.io/berriai/litellm:main-v1.81.9-stable
litellm_port: 4000
litellm_config_path: "{{ vault_appdata_path | default('/mnt/user/appdata') }}/litellm"
litellm_langfuse_host: "http://{{ vault_ip | default('192.168.1.203') }}:3030"
litellm_langfuse_public_key: "{{ vault_langfuse_init_project_public_key | default('') }}"
litellm_langfuse_secret_key: "{{ vault_langfuse_init_project_secret_key | default('') }}"

# Model routing
litellm_master_key: "{{ vault_litellm_master_key | default(athanor_litellm_api_key | default('')) }}"

# Cloud API keys (passed through to container env)
litellm_anthropic_api_key: "{{ vault_anthropic_api_key | default('') }}"
litellm_openai_api_key: "{{ vault_openai_api_key | default('') }}"
litellm_mistral_api_key: "{{ vault_mistral_api_key | default('') }}"
litellm_codestral_api_key: "{{ vault_codestral_api_key | default('') }}"
litellm_gemini_api_key: "{{ vault_gemini_api_key | default('') }}"
litellm_google_api_key: "{{ vault_google_api_key | default(vault_gemini_api_key | default('')) }}"
litellm_deepseek_api_key: "{{ vault_deepseek_api_key | default('') }}"
litellm_moonshot_api_key: "{{ vault_moonshot_api_key | default(vault_kimi_api_key | default('')) }}"
litellm_dashscope_api_key: "{{ vault_dashscope_api_key | default(vault_qwen_api_key | default('')) }}"
litellm_venice_api_key: "{{ vault_venice_api_key | default('') }}"
litellm_zai_api_key: "{{ vault_zai_api_key | default(vault_glm_api_key | default('')) }}"
litellm_openrouter_api_key: "{{ vault_openrouter_api_key | default('') }}"

# vLLM backends
vllm_node1_host: 192.168.1.244
vllm_node1_port: 8000
vllm_node1_model: "/models/Qwen3.5-27B-FP8"
vllm_node1_coder_port: 8006
vllm_node1_coder_model: "devstral-small-2"
vllm_node1_coder_public_model: "openai/devstral-small-2"

vllm_node2_host: 192.168.1.225
vllm_node2_port: 8000
vllm_node2_model: "/models/Qwen3.5-35B-A3B-AWQ-4bit"

vllm_vision_host: 192.168.1.225
vllm_vision_port: 8010
vllm_vision_model: "/models/Qwen3-VL-8B-Instruct-FP8"

vllm_embedding_host: "{{ dev_ip | default('192.168.1.189') }}"
vllm_embedding_port: 8001
vllm_embedding_model: "/models/Qwen3-Embedding-0.6B"
vllm_reranker_host: "{{ dev_ip | default('192.168.1.189') }}"
vllm_reranker_port: 8003
vllm_reranker_model: "/models/Qwen3-Reranker-0.6B"
