---
# VAULT LiteLLM: Model routing proxy
# Runs on VAULT via Docker API (Unraid)

- name: Create LiteLLM config directory
  ansible.builtin.file:
    path: "{{ litellm_config_path }}"
    state: directory
    mode: "0755"

- name: Deploy LiteLLM config
  ansible.builtin.template:
    src: litellm_config.yaml.j2
    dest: "{{ litellm_config_path }}/config.yaml"
    mode: "0644"
  register: litellm_config

- name: Run LiteLLM container
  community.docker.docker_container:
    name: litellm
    image: "{{ litellm_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ litellm_port }}:4000"
    volumes:
      - "{{ litellm_config_path }}/config.yaml:/app/config.yaml:ro"
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"
    env:
      LITELLM_MASTER_KEY: "{{ litellm_master_key }}"
      LITELLM_TELEMETRY: "False"
      DO_NOT_TRACK: "1"
      LANGFUSE_PUBLIC_KEY: "{{ litellm_langfuse_public_key }}"
      LANGFUSE_SECRET_KEY: "{{ litellm_langfuse_secret_key }}"
      LANGFUSE_HOST: "{{ litellm_langfuse_host }}"
      ANTHROPIC_API_KEY: "{{ litellm_anthropic_api_key }}"
      OPENAI_API_KEY: "{{ litellm_openai_api_key }}"
      MISTRAL_API_KEY: "{{ litellm_mistral_api_key }}"
      CODESTRAL_API_KEY: "{{ litellm_codestral_api_key }}"
      GEMINI_API_KEY: "{{ litellm_gemini_api_key }}"
      GOOGLE_API_KEY: "{{ litellm_google_api_key }}"
      DEEPSEEK_API_KEY: "{{ litellm_deepseek_api_key }}"
      MOONSHOT_API_KEY: "{{ litellm_moonshot_api_key }}"
      DASHSCOPE_API_KEY: "{{ litellm_dashscope_api_key }}"
      VENICE_API_KEY: "{{ litellm_venice_api_key }}"
      ZAI_API_KEY: "{{ litellm_zai_api_key }}"
      OPENROUTER_API_KEY: "{{ litellm_openrouter_api_key }}"
    restart: "{{ litellm_config.changed | default(false) }}"
  when: not ansible_check_mode

- name: Wait for LiteLLM to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ litellm_port }}/health/liveliness"
    status_code: 200
  register: litellm_ready
  retries: 10
  delay: 5
  when: not ansible_check_mode
