---
# Deploy backup scripts and cron jobs.
# Node 1: Qdrant backup (writes to VAULT via existing NFS data mount)
# VAULT: Neo4j export + appdata tarball (deployed via vault.yml)

- name: Create backup script directory
  file:
    path: /opt/athanor/scripts
    state: directory
    mode: "0755"

- name: Deploy Qdrant backup script (Node 1 only)
  copy:
    src: "{{ playbook_dir }}/../../scripts/backup-qdrant.sh"
    dest: /opt/athanor/scripts/backup-qdrant.sh
    mode: "0755"
  when: inventory_hostname == 'core'

- name: Create backup directory on NFS data share (Node 1)
  file:
    path: /mnt/vault/data/backups/athanor/qdrant
    state: directory
    mode: "0755"
  when: inventory_hostname == 'core'

- name: Schedule Qdrant backup cron (Node 1, daily 03:00)
  cron:
    name: "athanor-backup-qdrant"
    minute: "0"
    hour: "3"
    job: "BACKUP_DIR=/mnt/vault/data/backups/athanor/qdrant /opt/athanor/scripts/backup-qdrant.sh >> /var/log/athanor-backup.log 2>&1"
  when: inventory_hostname == 'core'

# VAULT backup tasks (Neo4j + appdata) deployed via vault.yml playbook
# since VAULT uses a different SSH method (dropbear/paramiko)
