---
# VAULT Miniflux: RSS reader for intelligence signal ingestion
# Deploys Miniflux + dedicated PostgreSQL on VAULT

- name: Create Miniflux directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ miniflux_config_path }}"
    - "{{ miniflux_postgres_data }}"

- name: Run Miniflux PostgreSQL container
  community.docker.docker_container:
    name: miniflux-postgres
    image: "{{ miniflux_postgres_image }}"
    state: started
    restart_policy: unless-stopped
    volumes:
      - "{{ miniflux_postgres_data }}:/var/lib/postgresql/data"
    env:
      POSTGRES_DB: "{{ miniflux_db_name }}"
      POSTGRES_USER: "{{ miniflux_db_user }}"
      POSTGRES_PASSWORD: "{{ miniflux_db_password }}"
      TZ: "America/Chicago"
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "3"
  when: not ansible_check_mode

- name: Wait for Miniflux PostgreSQL to be ready
  ansible.builtin.command:
    cmd: docker exec miniflux-postgres pg_isready -U {{ miniflux_db_user }}
  register: pg_ready
  retries: 10
  delay: 3
  until: pg_ready.rc == 0
  changed_when: false
  when: not ansible_check_mode

- name: Run Miniflux container
  community.docker.docker_container:
    name: miniflux
    image: "{{ miniflux_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ miniflux_port }}:8080"
    env:
      DATABASE_URL: "postgres://{{ miniflux_db_user }}:{{ miniflux_db_password }}@miniflux-postgres/{{ miniflux_db_name }}?sslmode=disable"
      RUN_MIGRATIONS: "1"
      CREATE_ADMIN: "1"
      ADMIN_USERNAME: "{{ miniflux_admin_user }}"
      ADMIN_PASSWORD: "{{ miniflux_admin_password }}"
      POLLING_FREQUENCY: "60"
      BATCH_SIZE: "50"
      WORKER_POOL_SIZE: "5"
      POLLING_PARSING_ERROR_LIMIT: "10"
      FETCH_ODYSEE_WATCH_TIME: "true"
      METRICS_COLLECTOR: "1"
      METRICS_ALLOWED_NETWORKS: "192.168.1.0/24"
      BASE_URL: "http://{{ vault_ip | default('192.168.1.203') }}:{{ miniflux_port }}"
      TZ: "America/Chicago"
    links:
      - miniflux-postgres
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "3"
  when: not ansible_check_mode

- name: Wait for Miniflux to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ miniflux_port }}/healthcheck"
    status_code: 200
  register: miniflux_ready
  retries: 15
  delay: 5
  when: not ansible_check_mode
