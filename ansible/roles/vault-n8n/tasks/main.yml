---
# VAULT n8n: Workflow automation for intelligence signal processing
# Processes Miniflux RSS feeds through LLM classification → Qdrant storage

- name: Create n8n data directory
  ansible.builtin.file:
    path: "{{ n8n_data_path }}"
    state: directory
    mode: "0755"
    owner: "1000"
    group: "1000"

- name: Run n8n container
  community.docker.docker_container:
    name: n8n
    image: "{{ n8n_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ n8n_port }}:5678"
    volumes:
      - "{{ n8n_data_path }}:/home/node/.n8n"
    env:
      N8N_HOST: "0.0.0.0"
      N8N_PORT: "5678"
      WEBHOOK_URL: "{{ n8n_webhook_url }}"
      GENERIC_TIMEZONE: "America/Chicago"
      TZ: "America/Chicago"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
    log_driver: json-file
    log_options:
      max-size: "10m"
      max-file: "3"
  when: not ansible_check_mode

- name: Wait for n8n to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ n8n_port }}/healthz"
    status_code: 200
  register: n8n_ready
  retries: 10
  delay: 5
  when: not ansible_check_mode
