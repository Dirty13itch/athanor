---
agent_deploy_dir: /opt/athanor/agents
agent_port: 9000
agent_api_token: "{{ athanor_agent_api_token | default('') }}"

agent_node1_host: "{{ node1_ip | default('192.168.1.244') }}"
agent_node2_host: "{{ node2_ip | default('192.168.1.225') }}"
agent_vault_host: "{{ vault_ip | default('192.168.1.203') }}"
agent_dev_host: "{{ dev_ip | default('192.168.1.189') }}"

# LiteLLM proxy — single entry point for all inference
agent_litellm_url: "http://{{ agent_vault_host }}:4000"
agent_litellm_api_key: "{{ athanor_litellm_api_key | default('') }}"
agent_llm_model: "reasoning"
agent_llm_model_fast: "fast"

# Direct runtime endpoints
agent_vllm_coordinator_url: "http://{{ agent_node1_host }}:8000"
agent_vllm_coder_url: "http://{{ agent_node1_host }}:8006"
agent_vllm_worker_url: "http://{{ agent_node2_host }}:8010"
agent_vllm_embedding_url: "http://{{ agent_dev_host }}:8001"
agent_vllm_reranker_url: "http://{{ agent_dev_host }}:8003"
agent_agent_server_url: "http://{{ agent_node1_host }}:9000"
agent_dashboard_url: "http://dev.athanor.local:3001"

# Knowledge and state
agent_qdrant_url: "http://{{ agent_vault_host }}:6333"
agent_redis_url: "{{ athanor_redis_url | default('redis://' ~ agent_vault_host ~ ':6379/0') }}"
agent_redis_password: "{{ athanor_redis_password | default('') }}"
agent_postgres_url: ""
agent_subscription_policy_path: "/app/config/subscription-routing-policy.yaml"
agent_descriptor_path: "/workspace/config/automation-backbone/agent-descriptor-registry.json"
agent_domain_packet_path: "/workspace/config/automation-backbone/domain-packets-registry.json"
agent_neo4j_url: "http://{{ agent_vault_host }}:7474"
agent_neo4j_user: "{{ athanor_neo4j_user | default('neo4j') }}"
agent_neo4j_password: "{{ athanor_neo4j_password | default('') }}"

# Monitoring and platform services
agent_prometheus_url: "{{ prometheus_url | default('http://' ~ agent_vault_host ~ ':9090') }}"
agent_grafana_url: "{{ grafana_url | default('http://' ~ agent_vault_host ~ ':3000') }}"
agent_langfuse_url: "{{ langfuse_url | default('http://' ~ agent_vault_host ~ ':3030') }}"
agent_gpu_orchestrator_url: "http://{{ agent_node1_host }}:9200"
agent_speaches_url: "http://{{ agent_node1_host }}:8200"

# Home and media
agent_home_assistant_url: "http://{{ agent_vault_host }}:8123"
agent_ha_token: "{{ athanor_ha_token | default('') }}"
agent_sonarr_url: "http://{{ agent_vault_host }}:8989"
agent_sonarr_api_key: "{{ athanor_sonarr_api_key | default('') }}"
agent_radarr_url: "http://{{ agent_vault_host }}:7878"
agent_radarr_api_key: "{{ athanor_radarr_api_key | default('') }}"
agent_tautulli_url: "http://{{ agent_vault_host }}:8181"
agent_tautulli_api_key: "{{ athanor_tautulli_api_key | default('') }}"
agent_plex_url: "http://{{ agent_vault_host }}:32400"
agent_prowlarr_url: "http://{{ agent_vault_host }}:9696"
agent_prowlarr_api_key: "{{ athanor_prowlarr_api_key | default('') }}"
agent_sabnzbd_url: "http://{{ agent_vault_host }}:8080"
agent_sabnzbd_api_key: "{{ athanor_sabnzbd_api_key | default('') }}"
agent_stash_url: "http://{{ agent_vault_host }}:9999"

# Experience and tenant surfaces
agent_comfyui_url: "http://{{ agent_node2_host }}:8188"
agent_open_webui_url: "http://{{ agent_node2_host }}:3000"
agent_vault_open_webui_url: "http://{{ agent_vault_host }}:3090"
agent_eoq_url: "http://{{ agent_node2_host }}:3002"

# Briefing and notifications
agent_miniflux_url: "http://{{ agent_vault_host }}:8070"
agent_miniflux_user: "{{ athanor_miniflux_user | default('admin') }}"
agent_miniflux_pass: "{{ athanor_miniflux_pass | default('') }}"
agent_ntfy_url: "http://{{ agent_vault_host }}:8880"
agent_ntfy_topic: "{{ athanor_ntfy_topic | default('athanor') }}"
