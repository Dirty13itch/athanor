---
# NVIDIA driver installation for compute nodes
# Installs nvidia-driver-575-open metapackage (resolves to 580.126.09)

- name: Install NVIDIA driver prerequisites
  ansible.builtin.apt:
    name:
      - build-essential
      - dkms
      - linux-headers-{{ ansible_kernel }}
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install NVIDIA driver (open kernel modules)
  ansible.builtin.apt:
    name: "{{ nvidia_driver_package }}"
    state: present

- name: Verify nvidia-smi works
  ansible.builtin.command: nvidia-smi --query-gpu=name,memory.total --format=csv,noheader
  register: nvidia_smi_output
  changed_when: false
  check_mode: false
  ignore_errors: true

- name: Show detected GPUs
  ansible.builtin.debug:
    msg: "{{ nvidia_smi_output.stdout_lines | default([]) }}"

- name: Verify expected GPU count
  ansible.builtin.assert:
    that:
      - nvidia_smi_output.stdout_lines | length == gpu_count
    fail_msg: "Expected {{ gpu_count }} GPUs but found {{ nvidia_smi_output.stdout_lines | length }}"
  when: nvidia_smi_output is succeeded

- name: Deploy GPU power limits systemd service
  ansible.builtin.template:
    src: nvidia-power-limits.service.j2
    dest: /etc/systemd/system/nvidia-power-limits.service
    owner: root
    group: root
    mode: '0644'
  when: nvidia_power_limit_watts is defined or nvidia_gpu_power_limits is defined
  notify: reload systemd

- name: Enable and start GPU power limits service
  ansible.builtin.systemd:
    name: nvidia-power-limits.service
    enabled: true
    state: started
    daemon_reload: true
  when: nvidia_power_limit_watts is defined or nvidia_gpu_power_limits is defined
