
# Node IPs (needed by VAULT Prometheus config)
node1_ip: "192.168.1.244"
node2_ip: "192.168.1.225"
vault_ip: "192.168.1.203"
dev_ip: "192.168.1.189"

# Cluster hostname resolution (managed by common role)
cluster_hosts:
  - { ip: "192.168.1.244", name: "foundry", aliases: ["core.athanor.local"] }
  - { ip: "192.168.1.225", name: "workshop", aliases: ["interface.athanor.local"] }
  - { ip: "192.168.1.203", name: "vault", aliases: ["vault.athanor.local"] }
  - { ip: "192.168.1.189", name: "dev", aliases: ["dev.athanor.local", "athanor.local"] }

# Map vault-encrypted secrets to role-expected variable names
athanor_sonarr_api_key: "{{ vault_agent_sonarr_api_key }}"
athanor_radarr_api_key: "{{ vault_agent_radarr_api_key }}"
athanor_tautulli_api_key: "{{ vault_agent_tautulli_api_key }}"
athanor_neo4j_password: "{{ vault_neo4j_password }}"
athanor_agent_api_token: "{{ vault_agent_api_token }}"
