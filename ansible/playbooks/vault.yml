---
# VAULT playbook — deploys monitoring, media stack, and Home Assistant
#
# Usage:
#   ansible-playbook playbooks/vault.yml                    # Full deploy
#   ansible-playbook playbooks/vault.yml --tags monitoring  # Monitoring only
#   ansible-playbook playbooks/vault.yml --tags media       # Media stack only
#   ansible-playbook playbooks/vault.yml --tags litellm     # LiteLLM proxy only
#   ansible-playbook playbooks/vault.yml --tags neo4j       # Neo4j graph DB only
#   ansible-playbook playbooks/vault.yml --tags redis       # Redis only
#   ansible-playbook playbooks/vault.yml --tags voice       # Voice (Piper + openWakeWord)
#   ansible-playbook playbooks/vault.yml --tags alerts      # Grafana alerts + backup exporter
#   ansible-playbook playbooks/vault.yml --tags gitea       # Gitea git forge
#   ansible-playbook playbooks/vault.yml --tags miniflux    # Miniflux RSS reader
#   ansible-playbook playbooks/vault.yml --tags n8n         # n8n workflow automation
#   ansible-playbook playbooks/vault.yml --tags postgres     # Postgres DB
#   ansible-playbook playbooks/vault.yml --tags ntfy        # ntfy notifications
#   ansible-playbook playbooks/vault.yml --tags loki        # Loki log aggregation
#   ansible-playbook playbooks/vault.yml --tags cadvisor    # Container metrics
#   ansible-playbook playbooks/vault.yml --tags alloy       # Grafana Alloy log shipper
#   ansible-playbook playbooks/vault.yml --tags vpn-torrent # qBittorrent + Gluetun VPN
#   ansible-playbook playbooks/vault.yml --tags plex        # Single service
#   ansible-playbook playbooks/vault.yml -e plex_claim_token=claim-xxxxx  # First Plex deploy
#
# Note: VAULT uses paramiko (dropbear SSH) with root user.
# Privilege escalation (become) is not needed — we're already root.

- name: Configure VAULT (Storage)
  hosts: vault
  become: false  # Already root via ansible_user
  roles:
    - role: vault-monitoring
      tags: [monitoring]
    - role: vault-media
      tags: [media]
    - role: vault-homeassistant
      tags: [homeassistant]
    - role: vault-litellm
      tags: [litellm]
    - role: vault-neo4j
      tags: [neo4j]
    - role: vault-redis
      tags: [redis]
    - role: vault-voice
      tags: [voice]
    - role: vault-langfuse
      tags: [langfuse]
    - role: vault-open-webui
      tags: [open-webui-vault]
    - role: vault-grafana-alerts
      tags: [alerts]
    - role: vault-gitea
      tags: [gitea]
    - role: vault-miniflux
      tags: [miniflux]
    - role: vault-n8n
      tags: [n8n]
    - role: vault-postgres
      tags: [postgres]
    - role: vault-ntfy
      tags: [ntfy]
    - role: vault-loki
      tags: [loki]
    - role: cadvisor
      tags: [cadvisor]
    - role: alloy
      tags: [alloy]
    - role: vault-vpn-torrent
      tags: [vpn-torrent]
