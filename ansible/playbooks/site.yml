---
# Master playbook — applies all roles to all managed nodes
# Usage: ansible-playbook playbooks/site.yml

- name: Configure Node 1 (Foundry)
  hosts: node1
  roles:
    - { role: common, tags: [common] }
    - { role: networking, tags: [networking] }
    - { role: nvidia, tags: [nvidia] }
    - { role: docker, tags: [docker] }
    - { role: monitoring, tags: [monitoring] }
    - { role: vllm, tags: [vllm] }
    - { role: qdrant, tags: [qdrant] }
    - { role: agents, tags: [agents] }
    - { role: gpu-orchestrator, tags: [gpu-orchestrator] }
    - { role: voice, tags: [voice] }
    - { role: backup, tags: [backup] }
    - { role: cadvisor, tags: [cadvisor] }
    - { role: alloy, tags: [alloy] }

- name: Configure Node 2 (Workshop)
  hosts: node2
  roles:
    - { role: common, tags: [common] }
    - { role: networking, tags: [networking] }
    - { role: nvidia, tags: [nvidia] }
    - { role: docker, tags: [docker] }
    - { role: monitoring, tags: [monitoring] }
    - { role: vllm, tags: [vllm] }
    - { role: comfyui, tags: [comfyui] }
    - { role: open-webui, tags: [open-webui] }
    - { role: dashboard, tags: [dashboard] }
    - { role: eoq, tags: [eoq] }
    - { role: ulrich-energy, tags: [ulrich-energy] }
    - { role: cadvisor, tags: [cadvisor] }
    - { role: alloy, tags: [alloy] }

- name: Configure VAULT (Storage)
  hosts: vault
  become: false
  roles:
    - { role: vault-monitoring, tags: [monitoring] }
    - { role: vault-media, tags: [media] }
    - { role: vault-homeassistant, tags: [homeassistant] }
    - { role: vault-litellm, tags: [litellm] }
    - { role: vault-neo4j, tags: [neo4j] }
    - { role: vault-redis, tags: [redis] }
    - { role: vault-voice, tags: [voice] }
    - { role: vault-langfuse, tags: [langfuse] }
    - { role: vault-open-webui, tags: [open-webui-vault] }
    - { role: vault-grafana-alerts, tags: [alerts] }
    - { role: vault-gitea, tags: [gitea] }
    - { role: vault-miniflux, tags: [miniflux] }
    - { role: vault-n8n, tags: [n8n] }
    - { role: vault-postgres, tags: [postgres] }
    - { role: vault-ntfy, tags: [ntfy] }
    - { role: vault-loki, tags: [loki] }
    - { role: cadvisor, tags: [cadvisor] }
    - { role: alloy, tags: [alloy] }
    - { role: vault-vpn-torrent, tags: [vpn-torrent] }

- name: Configure DEV (Retrieval)
  hosts: dev
  become: true
  roles:
    - { role: docker, tags: [docker] }
    - { role: monitoring, tags: [monitoring] }
    - { role: vllm-embedding, tags: [retrieval, vllm-embedding, reranker] }
