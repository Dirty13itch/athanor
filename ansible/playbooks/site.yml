---
# Master playbook — applies all roles to compute nodes
# Usage: ansible-playbook playbooks/site.yml

- name: Configure Node 1 (Foundry)
  hosts: node1
  roles:
    - common
    - nvidia
    - docker
    - nfs
    - monitoring
    - vllm
    - agents

- name: Configure Node 2 (Workshop)
  hosts: node2
  roles:
    - common
    - nvidia
    - docker
    - nfs
    - monitoring
    - vllm
    - comfyui
    - open-webui
    - dashboard
