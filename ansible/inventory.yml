---
all:
  vars:
    timezone: America/Chicago
    nfs_server: 192.168.1.203

  children:
    compute:
      children:
        node1:
          hosts:
            core:
              ansible_host: 192.168.1.244
              node_role: foundry
              gpu_count: 5
              gpu_type: "4x RTX 5070 Ti + RTX 4090"
              vram_total_gb: 88
              extra_firewall:
                - { port: 8001, proto: tcp, comment: "vLLM Embedding API" }
                - { port: 9000, proto: tcp, comment: "Agent Server" }
                - { port: 6333, proto: tcp, comment: "Qdrant REST API" }
                - { port: 6334, proto: tcp, comment: "Qdrant gRPC" }
        node2:
          hosts:
            interface:
              ansible_host: 192.168.1.225
              node_role: workshop
              gpu_count: 2
              gpu_type: "RTX 5090 + RTX 5060 Ti"
              vram_total_gb: 48
              extra_firewall:
                - { port: 3000, proto: tcp, comment: "Open WebUI" }
                - { port: 3001, proto: tcp, comment: "Dashboard" }
                - { port: 8188, proto: tcp, comment: "ComfyUI" }

    # VAULT is managed via scripts/vault-ssh.py or Ansible with vault-encrypted vars
    # Do NOT run ad-hoc commands against VAULT — write playbooks for review
    storage:
      hosts:
        vault:
          ansible_host: 192.168.1.203
          ansible_user: root
          ansible_connection: paramiko
          ansible_password: "{{ vault_password }}"
          node_role: storage
