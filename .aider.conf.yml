openai-api-base: http://vault:4000/v1
# Export ATHANOR_LITELLM_API_KEY or OPENAI_API_KEY before running Aider.
model: openai/worker
auto-commits: true
attribute-author: false
attribute-committer: true
commit-prompt: |
  Write a conventional commit message for these changes.
  Use format: type(scope): description
  Types: feat, fix, refactor, test, docs, chore, port
lint-cmd: ruff check --fix
auto-lint: true
map-tokens: 2048
map-refresh: auto
no-suggest-shell-commands: true
no-show-model-warnings: true
